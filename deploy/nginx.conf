# particleproductionsio — host-level nginx config
# IP-only for now. When domain is ready:
#   1. Change server_name to: particlepdio.particleformen.com
#   2. Run: certbot --nginx -d particlepdio.particleformen.com
#   3. nginx will auto-add SSL block

server {
    listen 80;
    server_name 76.13.2.74;    # TODO: replace with particlepdio.particleformen.com

    client_max_body_size 100m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
    }
}
